name: to_do
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0
  loading_animation_widget: ^1.3.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  flutter_svg: ^2.3.0
  internet_connection_checker: ^1.0.0+1
  fluttertoast: ^9.1.0
  shared_preferences: ^2.5.5
  phone_numbers_parser: ^8.2.1
  flutter_secure_storage: ^9.2.2
  http: ^1.3.0
  flutter_datetime_picker_plus: ^2.4.0
  intl: ^0.20.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.2
  time: ^2.1.6
  animated_analog_clock: ^0.2.2
  timezone: ^0.10.1
  app_blocker: ^2.1.0
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_main"
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
